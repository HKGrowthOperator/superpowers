<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Intelligence Dashboard</title>
  <meta name="description" content="Turn AI updates into structured business intelligence." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%234f7cff'/><text x='50' y='66' font-size='52' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='700'>AI</text></svg>" />
  <link rel="stylesheet" href="./assets/styles.css" />
  <script>
    // Set theme before paint to avoid a flash of the wrong theme.
    try {
      var t = localStorage.getItem('aiid.theme');
      if (t !== 'light' && t !== 'dark') {
        t = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      }
      document.documentElement.dataset.theme = t;
    } catch (e) { /* default stays dark */ }
  </script>
</head>
<body>
  <div id="app" class="app"></div>
  <noscript>This dashboard needs JavaScript enabled.</noscript>
  <script type="module" src="./main.js"></script>
</body>
</html>
