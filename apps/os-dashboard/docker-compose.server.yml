# Server-Version (CasaOS / eigener Server), Zugriff via Tailscale.
# Unterschiede zur lokalen Version:
#  - alle Geheimnisse kommen aus der .env (nichts fest verdrahtet)
#  - Postgres ist NICHT nach außen offen (nur intern im Docker-Netz)
#  - n8n + Web lauschen nur lokal; nach außen geht es über "tailscale serve" (HTTPS)
#
# Start auf dem Server:
#   docker compose -f docker-compose.server.yml --env-file .env up -d --build
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cockpit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?bitte in .env setzen}
      POSTGRES_DB: ${POSTGRES_DB:-cockpit}
    volumes:
      - ./pg_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    # KEIN ports: — die DB bleibt im internen Docker-Netz unerreichbar von außen.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cockpit} -d ${POSTGRES_DB:-cockpit}"]
      interval: 5s
      timeout: 5s
      retries: 10

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-cockpit}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:?bitte in .env setzen}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?bitte in .env setzen}
      N8N_SECURE_COOKIE: "false"
      GENERIC_TIMEZONE: Europe/Berlin
    volumes:
      - ./n8n_data:/home/node/.n8n
    ports:
      - "127.0.0.1:5678:5678" # nur lokal; via Tailscale freigeben wenn gewünscht

  web:
    build: ./web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-cockpit}:${POSTGRES_PASSWORD:?bitte in .env setzen}@postgres:5432/${POSTGRES_DB:-cockpit}
      AUTH_SECRET: ${AUTH_SECRET:?bitte in .env setzen}
      NODE_ENV: production
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      # WICHTIG: muss exakt der öffentlichen Tailscale-URL entsprechen!
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
    ports:
      - "127.0.0.1:3000:3000" # nur lokal; nach außen via "tailscale serve 3000"
