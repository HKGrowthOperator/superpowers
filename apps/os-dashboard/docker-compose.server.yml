# Server-Version (Ubuntu + Docker), hinter TLS-terminierendem Reverse-Proxy
# (Tailscale Funnel: extern HTTPS, intern HTTP + X-Forwarded-Proto: https).
#
# Start auf dem Server:
#   docker compose -f docker-compose.server.yml --env-file .env up -d --build
# Update:
#   git pull && docker compose -f docker-compose.server.yml --env-file .env up -d --build
#
# Host-Ports sind parametrisierbar (Defaults in Klammern):
#   WEB_PORT (3000)  ·  N8N_PORT (5678)
name: hk-cockpit

services:
  postgres:
    image: postgres:16-alpine
    container_name: hk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cockpit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?bitte in .env setzen}
      POSTGRES_DB: ${POSTGRES_DB:-cockpit}
    volumes:
      - ./pg_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    # KEIN ports: — die DB bleibt im internen Docker-Netz, von außen unerreichbar.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cockpit} -d ${POSTGRES_DB:-cockpit}"]
      interval: 5s
      timeout: 5s
      retries: 10

  n8n:
    image: n8nio/n8n:latest
    container_name: hk-n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-cockpit}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:?bitte in .env setzen}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?bitte in .env setzen}
      N8N_SECURE_COOKIE: "false"
      GENERIC_TIMEZONE: Europe/Berlin
    volumes:
      - ./n8n_data:/home/node/.n8n
    ports:
      - "127.0.0.1:${N8N_PORT:-5678}:5678" # nur lokal; bei Bedarf via Funnel freigeben

  web:
    build: ./web
    container_name: hk-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-cockpit}:${POSTGRES_PASSWORD:?bitte in .env setzen}@postgres:5432/${POSTGRES_DB:-cockpit}
      AUTH_SECRET: ${AUTH_SECRET:?bitte in .env setzen}
      NODE_ENV: production
      # KI-Assistent — OPTIONAL. Ohne Schlüssel läuft das Dashboard normal,
      # nur Chat-Assistent + Drive-Import sind deaktiviert.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      # Google Drive — OPTIONAL. Ohne Werte zeigt /drive "nicht eingerichtet".
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      # Muss EXAKT der öffentlichen Funnel-URL + /api/google/callback entsprechen.
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
    ports:
      - "${WEB_PORT:-3000}:3000" # Funnel terminiert TLS extern und proxyt hierher
